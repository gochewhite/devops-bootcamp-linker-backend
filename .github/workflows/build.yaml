
name: Backend Docker Build, Scan and Push

on:
  workflow_dispatch:
  push:
    branches: 
      - main
    paths-ignore:
      - ".github/workflows/**"
      - "**/*.md"

env:
  DOCKER_REPO: whiteobah
  IMAGE_NAME: linker-backend
  BACKEND_DIR: .
  BACKEND_PORT: 3001
  
jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Slack Notification (Start)
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "Backend Docker Build Started"
          SLACK_MESSAGE: |
            Build triggered by ${{ github.actor }} for repository ${{ github.repository }}
            Branch: ${{ github.ref_name }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_REPO }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Generate Docker Image Tag
        id: tag
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}
          tags: type=sha,format=short

      - name: Build Docker Image (for scanning)
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BACKEND_DIR }}
          file: ${{ env.BACKEND_DIR }}/Dockerfile
          load: true
          tags: ${{ steps.tag.outputs.tags }}
          build-args: |
            BACKEND_PORT=${{ env.BACKEND_PORT }}

      - name: Scan Docker Image for Vulnerabilities
        id: scan
        continue-on-error: true
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy image --format table --exit-code 1 --ignore-unfixed --severity CRITICAL,HIGH "${{ steps.tag.outputs.tags }}" | tee trivy-report.txt

      - name: Upload Scan Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-trivy-report
          path: trivy-report.txt

      - name: Block on Critical Vulnerabilities
        if: steps.scan.outcome == 'failure'
        run: exit 1

      - name: Push Image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BACKEND_DIR }}
          file: ${{ env.BACKEND_DIR }}/Dockerfile
          push: true
          tags: ${{ steps.tag.outputs.tags }}

      - name: Slack Notification (Final)
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status }}
          SLACK_MESSAGE: |
            Backend Docker Build pipeline *${{ job.status }}*.
            
            Actor: ${{ github.actor }}
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}